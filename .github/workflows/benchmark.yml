name: Benchmark Regression

on:
  push:
    branches: [main]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Racket
        uses: Bogdanp/setup-racket@v1.11
        with:
          version: '8.14'

      - name: Install dependencies
        run: cd racket/prologos && raco pkg install --auto --skip-installed

      - name: Pre-compile modules
        run: cd racket/prologos && raco make driver.rkt

      - name: Run benchmark regression check
        run: cd racket/prologos && racket tools/ci-regression-check.rkt
